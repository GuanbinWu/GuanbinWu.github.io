<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{title}}</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #f6f8fa;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .container {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 28px 32px;
      margin-bottom: 24px;
      box-shadow: 0 6px 18px rgba(140, 149, 159, 0.12);
    }

    h1 {
      margin: 0 0 0px 0;
      font-size: 24px;
      border-left: 4px solid #0969da;
      padding-left: 10px;
    }

    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      border-left: 4px solid #0969da;
      padding-left: 10px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 6px 0;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #57606a;
      margin-top: 32px;
      padding: 16px 0;
    }

    .contact p {
      margin: 6px 0;
    }

    .quote {
      margin-top: 10px;
      font-size: 13px;
      color: #8c959f;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>Guanbin Wu的主页</h1>
    </div>

    <div class="card">
      <h2>项目</h2>
      <ul>
        <li><a href="https://github.com/GuanbinWu/pdb2blender">pdb2blender</a></li>
        <li><a href="./font_Marble/test.html">font_Marble</a></li>
        <li><a href="https://github.com/GuanbinWu/cal_catenary">cal_catenary</a></li>
      </ul>
    </div>

    <div class="card">
      <h2>博客</h2>
      <ul>
        {{list}}
      </ul>
    </div>

    <div class="card contact">
      <h2>联系方式</h2>
      <p>个人邮箱: 2455688686@qq.com</p>
      <p>工作邮箱: 24110440034@m.fudan.edu.cn</p>
    </div>

    <div class="footer">
      <div class="quote">
        ----- In case I don't see you. Good afternoon, good evening, and good night. -----
      </div>
    </div>

  </div>
</body>
</html>
