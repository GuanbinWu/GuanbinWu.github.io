<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>高斯计算报错</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #f6f8fa;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .article {
      background: #ffffff;
      padding: 48px 56px;
      border: 1px solid #d8dee4;
      border-radius: 12px;
      box-shadow: 0 8px 24px #24292f;
      color: #1a1a1a;
    }

    .markdown-body {
      font-size: 16px;
      line-height: 1.75;
    }

    .markdown-body h1 {
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid  #1a1a1a;
      font-size: 2em;
      color: #1a1a1a;
    }

    .markdown-body h2 {
      margin-top: 40px;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .markdown-body h3 {
      margin-top: 28px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .markdown-body p {
      margin: 16px 0;
      color: #1a1a1a;
    }

    .markdown-body pre {
      padding: 18px;
      border-radius: 8px;
      overflow-x: auto;
      color: #0c2d3d;
      background: #0c2d3d;
    }
    .markdown-body code:not(pre code) {
    background: #0c2d3d;
    color: #fffefc;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 16px;
    }

    .markdown-body code {
      font-size: 16px;
      color: #fffefc;
    }

    @media (max-width: 720px) {
      .page {
        padding: 24px 14px 48px;
      }

      .article {
        padding: 28px 22px;
        border-radius: 8px;
      }

      .markdown-body {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <article class="markdown-body article">
      <h1>高斯计算报错</h1>
<ol>
<li>可全面参考<a href="http://bbs.keinsci.com/thread-4829-1-1.html">教程</a>。l101.exe报错有时会出现电荷和自旋多重度错误，返回程序希望输入整数。貌似只在PyCharm里编写gjf文件时出现，原因不明，vscode里重写电荷这行即可。</li>
</ol>

    </article>
  </main>
</body>
</html>
