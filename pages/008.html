<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>g16安装</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css"
  />

  <style>
    body {
      margin: 0;
      background: #f6f8fa;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .article {
      background: #ffffff;
      padding: 48px 56px;
      border: 1px solid #d8dee4;
      border-radius: 12px;
      box-shadow: 0 8px 24px #24292f;
      color: #1a1a1a;
    }

    .markdown-body {
      font-size: 16px;
      line-height: 1.75;
    }

    .markdown-body h1 {
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid  #1a1a1a;
      font-size: 2em;
      color: #1a1a1a;
    }

    .markdown-body h2 {
      margin-top: 40px;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .markdown-body h3 {
      margin-top: 28px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .markdown-body p {
      margin: 16px 0;
      color: #1a1a1a;
    }

    .markdown-body pre {
      padding: 18px;
      border-radius: 8px;
      overflow-x: auto;
      color: #0c2d3d;
      background: #0c2d3d;
    }
    .markdown-body code:not(pre code) {
    background: #0c2d3d;
    color: #fffefc;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 16px;
    }

    .markdown-body code {
      font-size: 16px;
      color: #fffefc;
    }

    @media (max-width: 720px) {
      .page {
        padding: 24px 14px 48px;
      }

      .article {
        padding: 28px 22px;
        border-radius: 8px;
      }

      .markdown-body {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <article class="markdown-body article">
      <h1>g16安装</h1>
<ol>
<li>网上任意教程均可，都差不多。配置共享高斯可参考<a href="http://bbs.keinsci.com/thread-14301-1-1.html">这个</a>，简单来讲，用root执行所有安装，新建一个gaussian组，将安装目录所属改为root:gaussian，使用者加入gaussian组即可。注意两个问题，安装路径必须是750权限（高斯特性，777不让用）；用户加入组后需重新登录才生效，如果还是无权限，说明登录信息没清空，<code>newgrp gaussian</code>有效，用<code>id</code>查看是否真的进组。</li>
</ol>

    </article>
  </main>
</body>
</html>
