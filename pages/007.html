  <main class="page">
    <article class="markdown-body article">
      <h1>Ubuntu 24.02 LTS 单机slurm安装</h1>
<ol>
<li>网上教程挺多，这个<a href="https://www.cnblogs.com/luk/p/18673674">教程</a>总体最有效，可以顺着做下来。但一开头<pre><code>sudo apt install slurm-wlm slurm-wlm-doc -y
</code></pre>
返回无法定位软件包。 尝试在这之前<pre><code>sudo apt install slurm slurmctld slurmdbd munge
</code></pre>
貌似解决问题了。因为搜了很多其他教程，历史操作较杂，无法确定具体是什么生效。
munge配置教程参考这个<a href="https://www.cnblogs.com/haibaraai0913/p/11016885.html">教程</a>，但<code>su munge</code>这一步时需要<code>usermod -s /bin/bash munge</code></li>
</ol>

    </article>
